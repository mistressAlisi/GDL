
<div class="modal-overlay" id="notEnoughEventsModal" style="display: none;">
    <div class="modal-backdrop"></div>

    <div class="modal-container">
        <div class="modal-content glass-modal">
            <!-- Close Button -->
            <button class="modal-close" id="closeModalBtn">
                <i data-lucide="x"></i>
            </button>

            <!-- Icon -->
            <div class="modal-icon-wrapper">
                <div class="modal-icon-pulse"></div>
                <div class="modal-icon-container">
                    <i data-lucide="alert-triangle" class="modal-icon"></i>
                </div>
            </div>

            <!-- Content -->
            <div class="modal-text">
                <h3 class="modal-title">Oops! Not Enough Events</h3>
                <p class="modal-message">
                    Not enough events available for this combo right now!
                </p>
                <p class="modal-submessage">
                    Try adding more events or reducing the payout!
                </p>
            </div>

            <!-- Action Button -->
            <button class="modal-button" id="modalActionBtn">
                Got It!
            </button>
        </div>
    </div>
</div>
<div class="modal-overlay" id="loadingModal" style="display: none;">
    <div class="modal-backdrop-no-dismiss"></div>

    <div class="modal-container">
        <div class="modal-content glass-modal">
            <!-- Spinner Icon -->
            <div class="modal-icon-wrapper">
                <div class="modal-icon-pulse-purple"></div>
                <div class="modal-icon-container-purple">
                    <i data-lucide="loader-2" class="modal-spinner"></i>
                </div>
            </div>

            <!-- Content -->
            <div class="modal-text">
                <h3 class="modal-title" id="loadingModalTitle">Processing...</h3>
                <p class="modal-submessage" id="loadingModalMessage">
                    Ticket Generation in progress
                </p>
            </div>

            <!-- Loading Dots -->
            <div class="loading-dots">
                <div class="loading-dot"></div>
                <div class="loading-dot" style="animation-delay: 0.15s;"></div>
                <div class="loading-dot" style="animation-delay: 0.3s;"></div>
            </div>
        </div>
    </div>
</div>
<link rel="stylesheet" href="/static/gdlfront/css/modals.css"/>
<script src="/static/gdlfront/js/GDLv2/modals.js"></script>
