<symbol id="ball-team" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="48"
          fill="var(--team-color)"
          stroke="rgba(255,255,255,.35)"
          stroke-width="2"/>

  <!-- subtle inner glow -->
  <circle cx="50" cy="50" r="42"
          fill="none"
          stroke="rgba(255,255,255,.15)"
          stroke-width="3"/>

  <!-- sport icon watermark -->
  <use href="#icon-generic-sport"
       x="22" y="22"
       width="56" height="56"
       opacity="0.15"
       fill="#fff"/>

  <!-- team initials -->
  <text x="50" y="58"
        text-anchor="middle"
        font-size="28"
        font-weight="900"
        fill="#fff"
        style="letter-spacing:-1px">
  </text>
</symbol>
