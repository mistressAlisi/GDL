<div id="theme-switcher">
  <button id="theme-btn" title="Switch Theme 🎨">🎨</button>
  <div class="theme-modal" id="theme-modal">
    <div class="theme-option" data-theme="neon" style="background:linear-gradient(135deg,#22052b,#7d4eff)"></div>
    <div class="theme-option" data-theme="dark" style="background:linear-gradient(135deg,#101010,#4d4545)"></div>
    <div class="theme-option" data-theme="pink" style="background:linear-gradient(135deg,#ff5ad6,#ff1fa8)"></div>
    <div class="theme-option" data-theme="orange" style="background:linear-gradient(135deg,#ff6600,#ffcc33)"></div>
    <div class="theme-option" data-theme="blue" style="background:linear-gradient(135deg,#0099ff,#00ffff)"></div>
    <div class="theme-option" data-theme="green" style="background:linear-gradient(135deg,#00ff99,#33ff33)"></div>
    <div class="theme-option" data-theme="purple" style="background:linear-gradient(135deg,#b84bff,#ff66cc)"></div>
    <div class="theme-option" data-theme="fire" style="background:linear-gradient(135deg,#ff4500,#ffcc00)"></div>
    <div class="theme-option" data-theme="ice" style="background:linear-gradient(135deg,#00f0f5,#00cccc)"></div>


  </div>
</div>
