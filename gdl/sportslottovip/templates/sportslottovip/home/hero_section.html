{% load static %}
<canvas id="canvas-bg"></canvas>

<div class="hero-container">
    <div class="hero-content">
        <!-- Subtitle -->
        <div class="hero-subtitle">
            THE FUTURE OF SPORTS GAMING
        </div>

        <!-- Main Title -->
        <div class="hero-title-wrapper">
            <div class="hero-title-bg"></div>
            <h1 class="hero-title">
                <span class="hero-title-main">SPORTSLOTTO</span><span class="hero-title-vip">.VIP</span>
            </h1>
        </div>

        <!-- Description -->
        <p class="hero-description">
            Pick Tickets. Track scores. Claim winnings.
            <br>
        </p>

        <!-- Buttons -->
        <div class="hero-buttons">
            <button class="btn-tutorial" onclick="showTutorial()">
                📚 How It Works
            </button>
            <button class="btn-play">
                <div class="btn-play-shimmer"></div>
                <span style="position: relative; display: flex; align-items: center; gap: 0.5rem;">
                    <span style="font-size: 1.125rem;">▶</span>
                    <span>Play Now</span>
                </span>
            </button>
        </div>
    </div>
</div>

<!-- Tutorial Modal -->
<div id="tutorialModal" class="modal-overlay" style="display: none;">
    <div class="modal-content-custom">
        <div class="modal-header-custom">
            <h3 class="modal-title-custom" id="tutorialTitle">Step 1: Welcome to SPORTSLOTTO!</h3>
            <button class="modal-close-btn" onclick="closeTutorial()">&times;</button>
        </div>

        <div class="modal-description" id="tutorialDescription">
            We combine odds from multiple games into ONE simple ticket. Here's an example ticket:
        </div>

        <div id="tutorialContent" style="margin-bottom: 1rem;">
            <!-- Content will be dynamically inserted here -->
        </div>

        <div class="modal-footer-custom">
            <button class="btn btn-secondary btn-sm" id="prevBtn" onclick="prevStep()">Previous</button>
            <div class="step-indicator" id="stepIndicator">Step 1 / 10</div>
            <button class="btn btn-sm" style="background-color: var(--bs-primary); color: white; border: none;" id="nextBtn" onclick="nextStep()">Next</button>
        </div>
    </div>
</div>

<style>
    /* Canvas - Fixed background using --bs-secondary */
    #canvas-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        background-color: var(--bs-secondary);
        pointer-events: none;
    }

    /* Hero Container - NO min-height so footer sits right below */
    .hero-container {
        position: relative;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 1rem;
        background: transparent;
    }

    .hero-content {
        text-align: center;
        max-width: 1200px;
        margin: 0 auto;
    }

    .hero-subtitle {
        font-size: 1rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        font-weight: 600;
        color: #c084fc;
        margin-bottom: 1.5rem;
    }

    @media (min-width: 768px) {
        .hero-subtitle {
            font-size: 1.125rem;
        }
    }

    .hero-title-wrapper {
        position: relative;
        margin-bottom: 2rem;
    }

    .hero-title-bg {
        position: absolute;
        inset: 0;
        background: linear-gradient(270deg, #667eea, #764ba2, #f093fb, #4facfe);
        background-size: 400% 400%;
        animation: gradient-wave 8s ease infinite;
        filter: blur(40px);
        opacity: 0.5;
    }

    .hero-title {
        position: relative;
        font-size: 2rem;
        font-weight: 900;
        word-break: break-word;
    }

    @media (min-width: 576px) {
        .hero-title { font-size: 2.5rem; }
    }

    @media (min-width: 768px) {
        .hero-title { font-size: 3rem; }
    }

    @media (min-width: 992px) {
        .hero-title { font-size: 3.5rem; }
    }

    .hero-title-main {
        background: linear-gradient(270deg, #667eea, #764ba2, #f093fb, #4facfe);
        background-size: 400% 400%;
        animation: gradient-wave 8s ease infinite, neon-pulse 2s ease-in-out infinite;

        -webkit-text-fill-color: transparent;

    .hero-title-vip {

    .hero-description {

    @media (min-width: 768px) {
        .hero-description { font-size: 1.5rem; }
    }

        .hero-description { font-size: 1.875rem; }
    }

    .hero-buttons {

        align-items: center;
        justify-content: center;
        flex-wrap: wrap;
        padding-top: 1rem;
    }

            flex-wrap: nowrap;
        }
    }

    .btn-tutorial {
        position: relative;
        padding: 0.75rem 2rem;
        font-size: 0.875rem;
        font-weight: 700;
        color: white;

    .btn-play {

    /* Ticket Card 3D Flip - STEP 1 COMPACT MOBILE */

        padding: 0.125rem 0;
    }

    @media (min-width: 768px) {
        .flip-card-container {
            padding: 1rem 0;

    }

    .flip-card {
        position: relative;
        width: 100%;
        max-width: 200px;
        height: 250px;
        margin: 0 auto;
        cursor: pointer;
        transition: transform 0.7s;
        transform-style: preserve-3d;
    }

    @media (min-width: 768px) {
        .flip-card {
            max-width: 320px;
            height: 420px;
        }
    }

    .flip-card.flipped {
        transform: rotateY(180deg);
    }

    .flip-card-face {
        position: absolute;
        inset: 0;
        backface-visibility: hidden;
        border-radius: 0.5rem;
        padding: 0.75rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        box-shadow: 0 25px 50px -12px var(--ticket-shadow);
        border: 2px solid rgba(255, 255, 255, 0.2);
        background: linear-gradient(135deg, #7e22ce, #ec4899, #7e22ce);
    }

    @media (min-width: 768px) {
        .flip-card-face {
            border-radius: 1rem;
            padding: 1.5rem;
        }
    }

    .flip-card-back {
        transform: rotateY(180deg);
        overflow-y: auto;
    }

    .card-title {
        color: var(--ticket-text);
        letter-spacing: 0.15em;
        text-transform: uppercase;
        font-weight: 900;
        font-size: 0.625rem;
    }

    @media (min-width: 768px) {

    .prize-box {

    }

    .card-action-text {

    .card-buttons {

    @media (min-width: 768px) {

        height: 30px;

        color: white;

        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s;
        cursor: pointer;
        flex-shrink: 0;
    }

    @media (min-width: 768px) {

            width: 40px;
            height: 40px;
            font-size: 1.25rem;

    }

    }

    }

    /* Animations */
    @keyframes gradient-wave {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    @keyframes neon-pulse {
        0%, 100% {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            filter: brightness(1);
        }
        50% {
            text-shadow: 0 0 20px currentColor, 0 0 40px currentColor, 0 0 60px currentColor;
            filter: brightness(1.5);
        }
    }

    @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
    }

    /* Prize Display */
    .prize-display {
        background-color: var(--prize-bg);
        border-radius: 0.5rem;
        padding: 0.75rem;
        text-align: center;
        border: 2px solid var(--prize-border);

    @media (min-width: 768px) {
