{% load static %}

<section class="tube-hero">

  <svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg"
       xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="420">

    <!-- Glass Boxes -->
    <rect x="280" y="190" width="240" height="80" rx="18"
          fill="rgba(0,0,0,0.55)" stroke="rgba(255,255,255,.25)"/>
    <rect x="280" y="330" width="240" height="80" rx="18"
          fill="rgba(0,0,0,0.55)" stroke="rgba(255,255,255,.25)"/>

    <!-- Tube Paths -->
    <path id="tube-top-left" d="M120 50 C200 140 300 200 360 230"
          fill="none" stroke="rgba(255,255,255,.18)" stroke-width="22" stroke-linecap="round"/>
    <path id="tube-top-right" d="M680 50 C600 140 500 200 440 230"
          fill="none" stroke="rgba(255,255,255,.18)" stroke-width="22" stroke-linecap="round"/>
    <path id="tube-bottom-left" d="M120 560 C200 460 300 400 360 370"
          fill="none" stroke="rgba(255,255,255,.18)" stroke-width="22" stroke-linecap="round"/>
    <path id="tube-bottom-right" d="M680 560 C600 460 500 400 440 370"
          fill="none" stroke="rgba(255,255,255,.18)" stroke-width="22" stroke-linecap="round"/>

    <!-- ================= TOP BALLS ================= -->
    {% for ball in hero_rows.top %}
      <!-- Top-left -->
      <g>
        <circle r="15" fill="{{ ball.color }}"/>
        <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">{{ ball.name }}</text>
        <animateMotion dur="2s" begin="{{ forloop.counter0|add:'0.1' }}s" fill="freeze">
          <mpath xlink:href="#tube-top-left"/>
        </animateMotion>
      </g>

      <!-- Top-right -->
      <g>
        <circle r="15" fill="{{ ball.color }}"/>
        <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">{{ ball.name }}</text>
        <animateMotion dur="2s" begin="{{ forloop.counter0|add:'0.3' }}s" fill="freeze">
          <mpath xlink:href="#tube-top-right"/>
        </animateMotion>
      </g>
    {% endfor %}

    <!-- ================= BOTTOM BALLS ================= -->
    {% for ball in hero_rows.bottom %}
      <!-- Bottom-left -->
      <g>
        <circle r="15" fill="{{ ball.color }}"/>
        <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">{{ ball.name }}</text>
        <animateMotion dur="2s" begin="{{ forloop.counter0|add:'0.2' }}s" fill="freeze">
          <mpath xlink:href="#tube-bottom-left"/>
        </animateMotion>
      </g>

      <!-- Bottom-right -->
      <g>
        <circle r="15" fill="{{ ball.color }}"/>
        <text x="0" y="5" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">{{ ball.name }}</text>
        <animateMotion dur="2s" begin="{{ forloop.counter0|add:'0.4' }}s" fill="freeze">
          <mpath xlink:href="#tube-bottom-right"/>
        </animateMotion>
      </g>
    {% endfor %}

  </svg>

</section>

<style>
.tube-hero {
  position: relative;
  width: 100%;
  max-width: 1000px;
  height: 420px;
  margin: 0 auto;
  overflow: visible;
}

.tube-hero svg {
  width: 100%;
  height: 100%;
}
</style>
