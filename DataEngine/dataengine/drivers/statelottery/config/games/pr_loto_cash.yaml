# Puerto Rico - Loto Cash
# Draws Monday, Wednesday, and Friday at 9:00 PM
# Pick 5 numbers from 1-35 plus 1 Bolo Cash from 1-10

state: PR
name: "Loto Cash"
slug: pr-loto-cash
url: "https://loteriasdepuertorico.pr.gov/loteria-electronica/loto-cash/"
game_type: bonus

format:
  main_count: 5
  main_range: [1, 35]
  bonus_count: 1
  bonus_range: [1, 10]
  is_positional: false

schedule:
  days: [monday, wednesday, friday]
  times:
    - time: "21:00"
      label: null
  timezone: "America/Puerto_Rico"

selectors:
  all_numbers: ".winning-numbers span, .ball, .number"
  draw_date: ".draw-date, .date"

parser:
  number_extractor: "text_content"
  date_format: "%m/%d/%Y"
  split_main_bonus: true

active: true
