# Lotto America
# Draws Monday, Wednesday, and Saturday at 10:15 PM ET (9:15 PM CT)
# Pick 5 numbers from 1-52, plus 1 Star Ball from 1-10

state: MULTI
name: "Lotto America"
slug: lotto-america
url: "https://www.lottoamerica.com/numbers/"
game_type: bonus

format:
  main_count: 5
  main_range: [1, 52]
  bonus_count: 1
  bonus_range: [1, 10]
  is_positional: false

schedule:
  days: [monday, wednesday, saturday]
  times:
    - time: "22:15"
      label: null
  timezone: "America/New_York"

selectors:
  # Lotto America displays numbers in list format
  all_numbers: ".winning-numbers li, .numbers-container span"
  draw_date: ".draw-date, h2.date"

parser:
  number_extractor: "text_content"
  date_format: "%A, %B %d, %Y"
  split_main_bonus: true

active: true
