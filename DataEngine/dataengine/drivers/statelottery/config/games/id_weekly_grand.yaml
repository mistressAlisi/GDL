# Idaho - Weekly Grand
# Draws Monday at 8:00 PM MT
# Pick 5 numbers from 1-52 plus 1 Grand Ball from 1-18

state: ID
name: "Weekly Grand"
slug: id-weekly-grand
url: "https://www.idaholottery.com/games/draw/weekly-grand"
game_type: bonus

format:
  main_count: 5
  main_range: [1, 52]
  bonus_count: 1
  bonus_range: [1, 18]
  is_positional: false

schedule:
  days: [monday]
  times:
    - time: "20:00"
      label: null
  timezone: "America/Boise"

selectors:
  all_numbers: ".gamepage--winningnumbers li"
  draw_date: ".draw-date, .date"

parser:
  number_extractor: "text_content"
  date_format: "%B %d, %Y"
  split_main_bonus: true

active: false
