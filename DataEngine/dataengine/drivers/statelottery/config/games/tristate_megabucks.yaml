# Tri-State Megabucks (Maine, New Hampshire, Vermont)
# Draws Wednesday and Saturday at 7:59 PM ET
# Pick 5 numbers from 1-41 plus 1 Megaball from 1-6

state: ME
name: "Tri-State Megabucks"
slug: tristate-megabucks
url: "https://www.mainelottery.com/games/megabucksplus.shtml"
game_type: bonus

format:
  main_count: 5
  main_range: [1, 41]
  bonus_count: 1
  bonus_range: [1, 6]
  is_positional: false

schedule:
  days: [wednesday, saturday]
  times:
    - time: "19:59"
      label: null
  timezone: "America/New_York"

selectors:
  all_numbers: ".winning-numbers span, .ball, .number"
  draw_date: ".draw-date, .date"

parser:
  number_extractor: "text_content"
  date_format: "%m/%d/%Y"
  split_main_bonus: true

active: true
