# Powerball
# Draws Monday, Wednesday, and Saturday at 10:59 PM ET
# Pick 5 numbers from 1-69, plus 1 Powerball from 1-26

state: MULTI
name: "Powerball"
slug: powerball
url: "https://www.powerball.com/previous-results?gc=powerball"
game_type: bonus

format:
  main_count: 5
  main_range: [1, 69]
  bonus_count: 1
  bonus_range: [1, 26]
  is_positional: false

schedule:
  days: [monday, wednesday, saturday]
  times:
    - time: "22:59"
      label: null
  timezone: "America/New_York"

selectors:
  # Powerball.com displays numbers in card format
  # Numbers appear as sequential elements before "Power Play" text
  all_numbers: ".card-body .white-balls span, .card-body .powerball span"
  draw_date: ".card-body .draw-date, .card-header"

parser:
  number_extractor: "text_content"
  date_format: "%a, %b %d, %Y"
  split_main_bonus: true

active: true
